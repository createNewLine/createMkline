<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
    <defs>
        <!-- 真正的箭头头部定义 -->
        <marker id="arrowhead" viewBox="0 0 10 10" refX="7" refY="5" 
                markerWidth="6" markerHeight="6" orient="auto">
            <!-- 真正的箭头形状：箭杆+箭头 -->
            <path d="M 0 1 L 8 5 L 0 9 L 1.5 5 Z" fill="#546E7A"/>
        </marker>
        
        <!-- 可选：更现代化的箭头 -->
        <marker id="modern-arrow" viewBox="0 0 10 10" refX="7" refY="5"
                markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 2 L 7 5 L 0 8 L 1.5 5 Z" fill="#546E7A"/>
        </marker>
    </defs>

    <!-- 1. 源文件夹（移动后变成软连接） -->
    <path d="M1,9 C1,7.9 1.9,7 3,7 h5 l2,2 h6 c1.1,0 2,0.9 2,2 v10 c0,1.1-0.9,2-2,2 H3 c-1.1,0-2-0.9-2-2 V9 z" fill="#FFB74D"/>

    <!-- 2. 目标文件夹（迁移的新位置） -->
    <path d="M21,9 C21,7.9 21.9,7 23,7 h4 l2,2 h3 c1.1,0 2,0.9 2,2 v10 c0,1.1-0.9,2-2,2 H23 c-1.1,0-2-0.9-2-2 V9 z" fill="#66BB6A"/>

    <!-- 3. 文件迁移箭头（优化版） -->
    <!-- 方案A：带箭头的直线 -->
    <g>
        <!-- 箭杆 -->
        <line x1="16" y1="16" x2="28" y2="16" 
              stroke="#546E7A" stroke-width="1.5" 
              marker-end="url(#arrowhead)"/>
        <!-- 箭头阴影，增强立体感 -->
        <line x1="16" y1="16" x2="28" y2="16" 
              stroke="#37474F" stroke-width="1.5" opacity="0.3"/>
    </g>
    
    <!-- 方案B：弯曲的迁移箭头（更生动） -->
    <!--
    <path d="M 13 16 C 18 12, 23 20, 28 16" 
          fill="none" stroke="#546E7A" stroke-width="1.5" 
          marker-end="url(#arrowhead)" stroke-linecap="round"/>
    -->

    <!-- 方案C：带数据传输效果的箭头 -->
    <g>
        <!-- 主箭头 -->
        <line x1="15" y1="16" x2="29" y2="16" 
              stroke="#546E7A" stroke-width="2" 
              marker-end="url(#arrowhead)" stroke-linecap="round"/>
        
        <!-- 虚线效果表示数据流 -->
        <line x1="15" y1="16" x2="29" y2="16" 
              stroke="#FFFFFF" stroke-width="1" 
              stroke-dasharray="3,2" opacity="0.5"/>
    </g>

    <!-- 4. 软连接/快捷方式角标 -->
    <g transform="translate(3, 8)">
        <path d="M 0 4 C 0 1 3 0 5 2 L 4 3 C 3 2 1.5 2 1.5 3.5 L 1.5 5" 
              fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M 6 0 L 6 2 L 4 3" 
              fill="none" stroke="#1565C0" stroke-width="1.5" 
              stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- 可选：添加文件图标在箭头中移动的效果 -->
    <g transform="translate(20, 13)">
        <!-- 移动中的文件图标 -->
        <rect x="0" y="0" width="4" height="6" rx="0.5" fill="#78909C" opacity="0.8"/>
        <line x1="1" y1="1.5" x2="3" y2="1.5" stroke="#FFFFFF" stroke-width="0.5"/>
        <line x1="1" y1="2.5" x2="3" y2="2.5" stroke="#FFFFFF" stroke-width="0.5"/>
        <line x1="1" y1="3.5" x2="2" y2="3.5" stroke="#FFFFFF" stroke-width="0.5"/>
    </g>
</svg>